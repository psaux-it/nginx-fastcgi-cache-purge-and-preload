name: Merge release SHA256SUMS

on:
  # Fire whenever any of the three upload workflows completes
  workflow_run:
    workflows:
      - Attach .deb assets to release
      - Attach .rpm assets to release
      - Attach .apk assets to release
    types: [completed]

  # Allow manual re-run for a specific tag if needed
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach merged SHA256SUMS to (e.g. v2.1.3). Leave empty to use latest."
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: merge-sha256sums-${{ github.event.workflow_run.head_branch || inputs.tag || 'manual' }}
  cancel-in-progress: false

jobs:
  merge-and-upload:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    env:
      REPO: ${{ github.repository }}

    steps:
      - name: Resolve target tag
        id: tag
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          echo "${{ github.token }}" | gh auth login --with-token

          if [[ -n "${INPUT_TAG}" ]]; then
            TAG="${INPUT_TAG}"
          else
            TAG="$(gh release view --repo "$REPO" --json tagName -q .tagName)"
          fi

          [[ -n "$TAG" ]] || { echo "Could not determine release tag"; exit 1; }
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Using release: $TAG"

      - name: Guard — ensure .deb, .rpm AND .apk assets all exist on the release
        id: guard
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail

          json="$(gh release view "$TAG_NAME" --repo "$REPO" --json assets)"
          debs=$(jq '[.assets[].name | select(endswith(".deb"))] | length' <<<"$json")
          rpms=$(jq '[.assets[].name | select(endswith(".rpm"))] | length' <<<"$json")
          apks=$(jq '[.assets[].name | select(endswith(".apk"))] | length' <<<"$json")

          echo "Found $debs .deb, $rpms .rpm, $apks .apk assets on $TAG_NAME"

          if (( debs < 1 || rpms < 1 || apks < 1 )); then
            echo "Not all asset types present yet; skipping merge (will re-trigger when remaining workflows finish)."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout default branch (to read repo checksum files)
        if: steps.guard.outputs.skip != 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Merge deb + rpm + apk SHA256SUMS -> unified SHA256SUMS
        if: steps.guard.outputs.skip != 'true'
        id: merge
        shell: bash
        run: |
          set -euo pipefail

          [[ -f safexec/deb/SHA256SUMS ]] || { echo "Missing safexec/deb/SHA256SUMS"; exit 1; }
          [[ -f safexec/rpm/SHA256SUMS ]] || { echo "Missing safexec/rpm/SHA256SUMS"; exit 1; }
          [[ -f safexec/apk/SHA256SUMS ]] || { echo "Missing safexec/apk/SHA256SUMS"; exit 1; }

          # deb and rpm — strip directory prefix, keep bare filename
          awk '{h=$1; $1=""; sub(/^[ \t]+/,""); f=$0; gsub(/^.*\//,"",f); printf "%s  %s\n",h,f }' \
            safexec/deb/SHA256SUMS safexec/rpm/SHA256SUMS \
            | sort -u > SHA256SUMS

          # apk — strip directory prefix but inject arch suffix before .apk
          # aarch64/safexec-X.apk → safexec-X.aarch64.apk
          # x86_64/safexec-X.apk  → safexec-X.x86_64.apk
          while IFS= read -r line; do
            hash=$(echo "$line" | awk '{print $1}')
            path=$(echo "$line" | awk '{print $2}')
            arch=$(echo "$path" | cut -d/ -f1)
            base=$(basename "$path" .apk)
            echo "$hash  ${base}.${arch}.apk"
          done < safexec/apk/SHA256SUMS | sort -u >> SHA256SUMS

          echo "Merged SHA256SUMS:"
          cat SHA256SUMS

      - name: Upload unified SHA256SUMS (overwrite if present)
        if: steps.guard.outputs.skip != 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          gh release upload "$TAG_NAME" --repo "$REPO" --clobber SHA256SUMS
