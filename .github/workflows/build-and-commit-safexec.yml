name: safexec CI

on:
  push:
    paths:
      - "safexec/safexec.c"
      - "safexec/libnpp_norm.c"
      - "safexec/helpers/deb.sh"
      - "safexec/helpers/rpm.sh"
      - ".github/workflows/build-and-commit-safexec.yml"
  workflow_dispatch: {}

concurrency:
  group: build-safexec-${{ github.ref }}
  cancel-in-progress: false

jobs:
  safexec-build-test-attest:
    name: Build safexec binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: '0.14.0'

      - name: Create output dir
        run: mkdir -p safexec/bin

      ############################################
      # safexec — static musl x86_64 + aarch64
      ############################################

      - name: Build safexec (x86_64, musl)
        run: |
          set -euo pipefail
          zig cc \
            -target x86_64-linux-musl \
            -D_GNU_SOURCE \
            -static -O2 -pipe -fPIE \
            -fstack-protector-strong \
            -D_FORTIFY_SOURCE=2 \
            -Wl,-z,relro,-z,now \
            -s \
            safexec/safexec.c \
            -o safexec/safexec-x86_64-linux-musl

      - name: Build safexec (aarch64, musl)
        run: |
          set -euo pipefail
          zig cc \
            -target aarch64-linux-musl \
            -D_GNU_SOURCE \
            -static -O2 -pipe -fPIE \
            -fstack-protector-strong \
            -D_FORTIFY_SOURCE=2 \
            -Wl,-z,relro,-z,now \
            -s \
            safexec/safexec.c \
            -o safexec/safexec-aarch64-linux-musl

      ############################################################
      # libnpp_norm.so — glibc variants
      ############################################################

      - name: Build libnpp_norm shim (x86_64, glibc)
        run: |
          set -euo pipefail
          zig cc \
            -target x86_64-linux-gnu.2.31 \
            -O2 -pipe -fPIC \
            -Wall -Wextra -Wformat=2 \
            -DWGET_FASTPATH \
            -shared \
            -s \
            safexec/libnpp_norm.c \
            -o safexec/libnpp_norm-x86_64-glibc.so \
            -Wl,-z,relro,-z,now \
            -Wl,-z,noexecstack \
            -Wl,-soname,libnpp_norm.so \
            -Wl,--as-needed \
            -ldl -lpthread

      - name: Build libnpp_norm shim (aarch64, glibc)
        run: |
          set -euo pipefail
          zig cc \
            -target aarch64-linux-gnu.2.31 \
            -O2 -pipe -fPIC \
            -Wall -Wextra -Wformat=2 \
            -DWGET_FASTPATH \
            -shared \
            -s \
            safexec/libnpp_norm.c \
            -o safexec/libnpp_norm-aarch64-glibc.so \
            -Wl,-z,relro,-z,now \
            -Wl,-z,noexecstack \
            -Wl,-soname,libnpp_norm.so \
            -Wl,--as-needed \
            -ldl -lpthread

      ############################################################
      # libnpp_norm.so — musl variants
      ############################################################

      - name: Build libnpp_norm shim (x86_64, musl)
        run: |
          set -euo pipefail
          docker run --rm -v "$PWD":/src -w /src/safexec alpine:3.21 sh -euxc '
            apk add --no-cache build-base musl-dev
            gcc -O2 -pipe -fPIC -Wall -Wextra -Wformat=2 -DWGET_FASTPATH \
                -shared libnpp_norm.c -o libnpp_norm-x86_64-musl.so \
                -Wl,-z,relro,-z,now -Wl,-z,noexecstack -Wl,-soname,libnpp_norm.so \
                -Wl,--as-needed -ldl -pthread
            strip --strip-unneeded libnpp_norm-x86_64-musl.so
          '

      - name: Enable binfmt for arm64
        run: |
          docker run --privileged --rm tonistiigi/binfmt --install arm64

      - name: Build libnpp_norm shim (aarch64, musl)
        run: |
          set -euo pipefail
          docker run --rm --platform=linux/arm64 \
            -v "$PWD":/src -w /src/safexec alpine:3.21 sh -euxc '
            apk add --no-cache build-base musl-dev
            gcc -O2 -pipe -fPIC -Wall -Wextra -Wformat=2 -DWGET_FASTPATH \
                -shared libnpp_norm.c -o libnpp_norm-aarch64-musl.so \
                -Wl,-z,relro,-z,now -Wl,-z,noexecstack -Wl,-soname,libnpp_norm.so \
                -Wl,--as-needed -ldl -pthread
            strip --strip-unneeded libnpp_norm-aarch64-musl.so
          '

      - name: Fix artifact ownership
        run: |
          sudo chown "$(id -u)":"$(id -g)" \
            safexec/safexec-*-linux-musl \
            safexec/libnpp_norm-*.so || true

      - name: Verify SONAME on shims
        run: |
          set -euo pipefail
          for so in safexec/libnpp_norm-*-glibc.so safexec/libnpp_norm-*-musl.so; do
            test -f "$so" || { echo "Missing $so"; exit 1; }
            echo "Checking SONAME for $so"
            readelf -d "$so" | grep -E 'SONAME.*libnpp_norm\.so' >/dev/null \
              || { echo "Bad/missing SONAME in $so"; exit 1; }
          done

      - name: Verify safexec binaries are static
        run: |
          set -euo pipefail
          ls -l safexec/safexec-*-linux-musl
          file safexec/safexec-*-linux-musl
          for f in safexec/safexec-*-linux-musl; do
            ! readelf -lW "$f" | grep -q INTERP
          done

      # All remaining steps
      - name: Stage build artifacts
        run: |
          set -euo pipefail
          mv safexec/safexec-*-linux-musl safexec/bin/
          mv safexec/libnpp_norm-*.so safexec/bin/

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd safexec/bin
          for f in safexec-*-linux-musl; do
            test -x "$f"
            sha256sum "$f" > "$f.sha256"
          done
          for f in libnpp_norm-*.so; do
            test -f "$f"
            sha256sum "$f" > "$f.sha256"
          done
          sha256sum safexec-*-linux-musl libnpp_norm-*.so | sort > SHA256SUMS

      - name: Generate SLSA provenance for build artifacts
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: |
            safexec/bin/safexec-*-linux-musl
            safexec/bin/libnpp_norm-*.so
            safexec/bin/SHA256SUMS

      - name: Upload safexec build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: safexec-binaries
          path: |
            safexec/bin/safexec-*-linux-musl
            safexec/bin/libnpp_norm-*.so
            safexec/bin/*.sha256
            safexec/bin/SHA256SUMS

      - name: Fix workspace perms & exclude build dirs
        run: |
          set -euo pipefail
          sudo chown -R "$(id -u)":"$(id -g)" .
          sudo rm -rf pkg-safexec-*-single || true
          mkdir -p .git/info
          for p in safexec/bin/ pkg-safexec-*/; do
            grep -qxF "$p" .git/info/exclude 2>/dev/null || echo "$p" >> .git/info/exclude
          done

      - name: Final clean of packaging worktrees
        run: |
          sudo chown -R "$(id -u)":"$(id -g)" pkg-safexec-*-single 2>/dev/null || true
          sudo rm -rf pkg-safexec-*-single || true

      - name: Commit binaries & checksums back to repo
        if: github.ref_type == 'branch'
        env:
          GITHUB_REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          BRANCH="${GITHUB_REF#refs/heads/}"
          chmod 755 safexec/bin/safexec-*-linux-musl || true
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --prune origin
          cp -r safexec/bin /tmp/safexec-bin-new
          git stash push -u -m "ci-artifacts" || true
          git checkout -B "${BRANCH}" "origin/${BRANCH}"
          git stash pop || true
          cp -r /tmp/safexec-bin-new/. safexec/bin/
          git add -f \
            safexec/bin/safexec-*-linux-musl \
            safexec/bin/libnpp_norm-*.so \
            safexec/bin/*.sha256 \
            safexec/bin/SHA256SUMS || true
          git commit --allow-empty \
            -m "ci: build safexec + libnpp_norm (glibc/musl) [skip ci]"
          for attempt in 1 2; do
            git pull --rebase --autostash origin "${BRANCH}" && \
            git push origin "HEAD:${BRANCH}" && exit 0
            sleep 2
            git fetch --prune origin
          done
          exit 1

  build-and-attest-debs:
    name: Build & attest Debian packages
    needs: safexec-build-test-attest
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
      actions: read
    env:
      DEB_REV: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Guard — skip if binaries unchanged
        id: guard
        shell: bash
        env:
          GITHUB_REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          git fetch --prune origin
          BRANCH="${GITHUB_REF#refs/heads/}"
          CHANGED="$(git diff --name-only ${GITHUB_SHA}^ ${GITHUB_SHA})"
          echo "Changed files: $CHANGED"
          if echo "$CHANGED" | grep -qE 'safexec\.(c|h)|libnpp_norm\.c|helpers/deb\.sh|build-and-commit-safexec\.yml'; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Relevant change detected, proceeding with deb build."
          else
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No deb-relevant changes, skipping."
          fi

      - name: Download safexec build artifacts
        if: steps.guard.outputs.skip != 'true'
        uses: actions/download-artifact@v7
        with:
          name: safexec-binaries
          path: safexec/bin

      - name: Ensure exec bit on safexec
        if: steps.guard.outputs.skip != 'true'
        run: chmod 755 safexec/bin/safexec-*-linux-musl || true

      - name: Ensure Debian tooling
        if: steps.guard.outputs.skip != 'true'
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            devscripts debhelper dpkg-dev lintian build-essential fakeroot sudo debhelper-compat

      - name: Resolve version from safexec -v
        if: steps.guard.outputs.skip != 'true'
        id: ver
        env:
          DEB_REV: ${{ env.DEB_REV }}
        shell: bash
        run: |
          set -euo pipefail

          BIN="safexec/bin/safexec-x86_64-linux-musl"
          [[ -x "$BIN" ]] || BIN="safexec/bin/safexec-aarch64-linux-musl"
          [[ -x "$BIN" ]] || { echo "safexec binary not found in safexec/bin"; exit 1; }

          # Only take the first line
          FIRST_LINE="$("$BIN" -v | head -n1)"
          BASE_VER="$(printf '%s\n' "$FIRST_LINE" | awk '{print $2}')"

          # (Optional) sanity-check it looks like N.N or N.N.N
          if ! printf '%s' "$BASE_VER" | grep -Eq '^[0-9]+(\.[0-9]+){1,2}$'; then
            echo "Could not parse version from: $FIRST_LINE"
            exit 1
          fi

          echo "Detected safexec version: $BASE_VER (DEB_REV=${DEB_REV:-1})"

          {
            printf 'base=%s\n' "$BASE_VER"
            printf 'deb=%s-%s\n' "$BASE_VER" "${DEB_REV:-1}"
          } >> "$GITHUB_OUTPUT"

      - name: Make deb.sh executable
        if: steps.guard.outputs.skip != 'true'
        run: chmod +x safexec/helpers/deb.sh

      - name: Build .deb (amd64)
        if: steps.guard.outputs.skip != 'true'
        run: |
          set -euo pipefail
          docker run --rm -v "$PWD":/src -w /src debian:bullseye-slim bash -euxo pipefail -c '
            apt-get update
            apt-get install -y --no-install-recommends devscripts debhelper dpkg-dev lintian build-essential sudo fakeroot
            chmod +x safexec/helpers/deb.sh
            bash safexec/helpers/deb.sh --arch amd64 --version '"${{ steps.ver.outputs.deb }}"'
          '

      - name: Enable binfmt for arm64
        if: steps.guard.outputs.skip != 'true'
        run: |
          set -euo pipefail
          docker run --privileged --rm tonistiigi/binfmt --install arm64

      - name: Build .deb (arm64)
        if: steps.guard.outputs.skip != 'true'
        run: |
          set -euo pipefail
          docker run --rm --platform=linux/arm64 -v "$PWD":/src -w /src debian:bullseye-slim bash -euxo pipefail -c '
            apt-get update
            apt-get install -y --no-install-recommends devscripts debhelper dpkg-dev lintian build-essential sudo fakeroot
            chmod +x safexec/helpers/deb.sh
            bash safexec/helpers/deb.sh --arch arm64 --version '"${{ steps.ver.outputs.deb }}"'
          '

      - name: Fix ownership of deb build outputs
        if: steps.guard.outputs.skip != 'true'
        run: |
          set -euo pipefail
          sudo chown -R "$(id -u)":"$(id -g)" .

      - name: Collect .debs into safexec/deb/
        if: steps.guard.outputs.skip != 'true'
        run: |
          set -euo pipefail
          mkdir -p safexec/deb
          mv "safexec_${{ steps.ver.outputs.deb }}_amd64.deb" safexec/deb/ 2>/dev/null || true
          mv "safexec_${{ steps.ver.outputs.deb }}_arm64.deb" safexec/deb/ 2>/dev/null || true
          cd safexec/deb
          ls -1 *.deb
          sha256sum *.deb | sort > SHA256SUMS

      - name: Clean packaging worktrees
        if: steps.guard.outputs.skip != 'true'
        run: |
          set -euo pipefail
          sudo rm -rf pkg-safexec-*-single || true

      - name: Generate SLSA provenance (deb packages)
        if: steps.guard.outputs.skip != 'true'
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: |
            safexec/deb/*.deb
            safexec/deb/SHA256SUMS

      - name: Upload debs as artifacts
        if: steps.guard.outputs.skip != 'true'
        uses: actions/upload-artifact@v6
        with:
          name: safexec-debs-${{ steps.ver.outputs.deb }}
          path: |
            safexec/deb/*.deb
            safexec/deb/SHA256SUMS
          if-no-files-found: error

      - name: Fix workspace perms & exclude build dirs
        if: steps.guard.outputs.skip != 'true'
        run: |
          set -euo pipefail
          # Hand all files back to the runner (some were created by root in containers)
          sudo chown -R "$(id -u)":"$(id -g)" .

          # Remove container-created packaging worktrees if present
          sudo rm -rf pkg-safexec-*-single || true

          # Keep build outputs out of Git so they don't get stashed/committed
          mkdir -p .git/info
          for p in safexec/bin/ pkg-safexec-*/; do
            grep -qxF "$p" .git/info/exclude 2>/dev/null || echo "$p" >> .git/info/exclude
          done

      - name: Final clean of packaging worktrees (authoritative)
        if: steps.guard.outputs.skip != 'true'
        run: |
          set -euo pipefail
          # Ensure no root-owned worktrees remain before git checkout
          sudo chown -R "$(id -u)":"$(id -g)" pkg-safexec-*-single 2>/dev/null || true
          sudo rm -rf pkg-safexec-*-single || true

      - name: Commit .deb packages back to repo
        if: github.ref_type == 'branch' && steps.guard.outputs.skip != 'true'
        env:
          GITHUB_REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          BRANCH="${GITHUB_REF#refs/heads/}"

          # Ensure we track the remote branch and have its latest commits
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          mkdir -p .git/info
          printf 'safexec/bin/\n' >> .git/info/exclude

          git fetch --prune origin
          git stash push -u -m "ci-artifacts" || true
          git checkout -B "${BRANCH}" "origin/${BRANCH}"
          git stash pop || true

          # Defuse any local ignore for safexec/deb and force-add the .deb files (in case repo .gitignore blocks them)
          sed -i -E '/^safexec\/deb\/[[:space:]]*$/d' .git/info/exclude 2>/dev/null || true
          git add -f safexec/deb/*.deb safexec/deb/SHA256SUMS || true

          if git diff --cached --quiet; then
            echo "No .deb changes to commit."
            exit 0
          fi

          git commit -m "ci: add Debian packages for ${{ steps.ver.outputs.deb }}"

          # Integrate remote updates, then push. Retry once to beat races.
          for attempt in 1 2; do
            git pull --rebase --autostash origin "${BRANCH}" && \
            git push origin "HEAD:${BRANCH}" && exit 0
            echo "Push attempt ${attempt} failed; refetching and retrying..."
            sleep 2
            git fetch --prune origin
          done

          echo "Giving up after 2 attempts."
          exit 1

  build-and-attest-rpms:
    name: Build & attest RPM packages
    needs: safexec-build-test-attest
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Guard — skip if binaries unchanged
        id: guard
        shell: bash
        env:
          GITHUB_REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          git fetch --prune origin
          BRANCH="${GITHUB_REF#refs/heads/}"
          CHANGED="$(git diff --name-only ${GITHUB_SHA}^ ${GITHUB_SHA})"
          echo "Changed files: $CHANGED"
          if echo "$CHANGED" | grep -qE 'safexec\.(c|h)|libnpp_norm\.c|helpers/rpm\.sh|build-and-commit-safexec\.yml'; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Relevant change detected, proceeding with rpm build."
          else
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No rpm-relevant changes, skipping."
          fi

      - name: Download safexec build artifacts
        if: steps.guard.outputs.skip != 'true'
        uses: actions/download-artifact@v7
        with:
          name: safexec-binaries
          path: safexec/bin

      - name: Ensure exec bits
        if: steps.guard.outputs.skip != 'true'
        run: |
          chmod 755 safexec/bin/safexec-*-linux-musl || true
          chmod +x safexec/helpers/rpm.sh

      # Resolve version from safexec -v
      - name: Resolve version from safexec -v
        if: steps.guard.outputs.skip != 'true'
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          BIN="safexec/bin/safexec-x86_64-linux-musl"
          [[ -x "$BIN" ]] || BIN="safexec/bin/safexec-aarch64-linux-musl"
          [[ -x "$BIN" ]] || { echo "safexec binary not found in safexec/bin"; exit 1; }
          FIRST_LINE="$("$BIN" -v | head -n1)"
          BASE_VER="$(printf '%s\n' "$FIRST_LINE" | awk '{print $2}')"
          [[ "$BASE_VER" =~ ^[0-9]+(\.[0-9]+){1,2}$ ]] || { echo "Bad version: $BASE_VER"; exit 1; }
          echo "base=$BASE_VER" >> "$GITHUB_OUTPUT"
          # For RPM we pass version as VERSION-REL; pick 1 as default release
          echo "rpm=${BASE_VER}-1" >> "$GITHUB_OUTPUT"

      # Build x86_64 RPM on Rocky 10
      - name: Build RPM (x86_64 / Rocky 10)
        if: steps.guard.outputs.skip != 'true'
        run: |
          set -euo pipefail
          docker run --rm -v "$PWD":/src -w /src quay.io/rockylinux/rockylinux:10 bash -euxo pipefail -c '
            # speed up metadata a bit
            dnf -y makecache
            bash safexec/helpers/rpm.sh --arch amd64 --version '"${{ steps.ver.outputs.rpm }}"'
            chown -R 1000:1000 /src/pkg-safexec-amd64-rpm || true
          '

      # Enable arm64 binfmt
      - name: Enable binfmt for arm64
        if: steps.guard.outputs.skip != 'true'
        run: docker run --privileged --rm tonistiigi/binfmt --install arm64

      # Build aarch64 RPM on Rocky 10 (arm64 container)
      - name: Build RPM (aarch64 / Rocky 10)
        if: steps.guard.outputs.skip != 'true'
        run: |
          set -euo pipefail
          docker run --rm --platform=linux/arm64 -v "$PWD":/src -w /src quay.io/rockylinux/rockylinux:10 bash -euxo pipefail -c '
            dnf -y makecache
            bash safexec/helpers/rpm.sh --arch arm64 --version '"${{ steps.ver.outputs.rpm }}"'
            chown -R 1000:1000 /src/pkg-safexec-arm64-rpm || true
          '

      - name: Collect RPMs -> safexec/rpm
        if: steps.guard.outputs.skip != 'true'
        run: |
          set -euo pipefail
          mkdir -p safexec/rpm
          find pkg-safexec-*-rpm/rpmbuild/RPMS -type f -name "safexec-*.rpm" -print -exec cp -v {} safexec/rpm/ \;
          cd safexec/rpm
          ls -1 *.rpm
          sha256sum *.rpm | sort > SHA256SUMS

      - name: Generate SLSA provenance (RPM packages)
        if: steps.guard.outputs.skip != 'true'
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: |
            safexec/rpm/*.rpm
            safexec/rpm/SHA256SUMS

      - name: Upload RPMs as artifacts
        if: steps.guard.outputs.skip != 'true'
        uses: actions/upload-artifact@v6
        with:
          name: safexec-rpms-${{ steps.ver.outputs.rpm }}
          path: |
            safexec/rpm/*.rpm
            safexec/rpm/SHA256SUMS
          if-no-files-found: error

      - name: Clean packaging worktrees
        if: steps.guard.outputs.skip != 'true'
        run: |
          sudo chown -R "$(id -u)":"$(id -g)" pkg-safexec-*-rpm 2>/dev/null || true
          sudo rm -rf pkg-safexec-*-rpm || true

      - name: Commit RPMs back to repo
        if: github.ref_type == 'branch' && steps.guard.outputs.skip != 'true'
        env:
          GITHUB_REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          BRANCH="${GITHUB_REF#refs/heads/}"

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # keep temp build dirs ignored; allow safexec/rpm to be committed
          mkdir -p .git/info
          {
            echo 'pkg-safexec-*/'
            echo 'safexec/bin/'
          } >> .git/info/exclude

          git fetch --prune origin
          git stash push -u -m "ci-artifacts" || true
          git checkout -B "${BRANCH}" "origin/${BRANCH}"
          git stash pop || true

          git add -f safexec/rpm/*.rpm safexec/rpm/SHA256SUMS || true
          if git diff --cached --quiet; then
            echo "No RPM changes to commit."
            exit 0
          fi

          git commit -m "ci: add RPM packages for ${{ steps.ver.outputs.rpm }}"

          for attempt in 1 2; do
            git pull --rebase --autostash origin "${BRANCH}" && \
            git push origin "HEAD:${BRANCH}" && exit 0
            echo "Push attempt ${attempt} failed; retrying…"
            sleep 2
            git fetch --prune origin
          done

          echo "Giving up after 2 attempts."
          exit 1

  build-and-attest-apks:
    name: Build & attest Alpine APK packages
    needs: safexec-build-test-attest
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Guard — skip if binaries unchanged
        id: guard
        shell: bash
        env:
          GITHUB_REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          git fetch --prune origin
          BRANCH="${GITHUB_REF#refs/heads/}"
          CHANGED="$(git diff --name-only ${GITHUB_SHA}^ ${GITHUB_SHA})"
          echo "Changed files: $CHANGED"
          if echo "$CHANGED" | grep -qE 'safexec\.(c|h)|libnpp_norm\.c|helpers/apk\.sh|build-and-commit-safexec\.yml'; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Relevant change detected, proceeding with apk build."
          else
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No apk-relevant changes, skipping."
          fi

      - name: Download safexec build artifacts
        if: steps.guard.outputs.skip != 'true'
        uses: actions/download-artifact@v7
        with:
          name: safexec-binaries
          path: safexec/bin

      - name: Ensure exec bit on safexec
        if: steps.guard.outputs.skip != 'true'
        run: chmod 755 safexec/bin/safexec-*-linux-musl || true

      - name: Make apk.sh executable
        if: steps.guard.outputs.skip != 'true'
        run: chmod +x safexec/helpers/apk.sh

      # Resolve version from the safexec binary itself (same pattern as deb/rpm jobs)
      - name: Resolve version from safexec -v
        if: steps.guard.outputs.skip != 'true'
        id: ver
        shell: bash
        run: |
          set -euo pipefail

          BIN="safexec/bin/safexec-x86_64-linux-musl"
          [[ -x "$BIN" ]] || BIN="safexec/bin/safexec-aarch64-linux-musl"
          [[ -x "$BIN" ]] || { echo "safexec binary not found in safexec/bin"; exit 1; }

          FIRST_LINE="$("$BIN" -v | head -n1)"
          BASE_VER="$(printf '%s\n' "$FIRST_LINE" | awk '{print $2}')"

          if ! printf '%s' "$BASE_VER" | grep -Eq '^[0-9]+(\.[0-9]+){1,2}$'; then
            echo "Could not parse version from: $FIRST_LINE"
            exit 1
          fi

          echo "Detected safexec version: $BASE_VER"

          {
            printf 'base=%s\n' "$BASE_VER"
            # Alpine APK release format: pkgver-r<pkgrel>  (e.g. 1.9.3-r1)
            printf 'apk=%s-r1\n' "$BASE_VER"
          } >> "$GITHUB_OUTPUT"

      # x86_64 APK
      - name: Build APK (x86_64)
        if: steps.guard.outputs.skip != 'true'
        run: |
          set -euo pipefail
          docker run --rm -v "$PWD":/src -w /src alpine:3.21 sh -euxc '
            apk add --no-cache alpine-sdk sudo >/dev/null 2>&1
            chmod +x safexec/helpers/apk.sh
            bash safexec/helpers/apk.sh --arch x86_64 --version '"${{ steps.ver.outputs.apk }}"'
          '

      # aarch64 APK
      - name: Enable binfmt for arm64
        if: steps.guard.outputs.skip != 'true'
        run: docker run --privileged --rm tonistiigi/binfmt --install arm64
 
      - name: Build APK (aarch64)
        if: steps.guard.outputs.skip != 'true'
        run: |
          set -euo pipefail
          docker run --rm --platform=linux/arm64 \
            -v "$PWD":/src -w /src alpine:3.21 sh -euxc '
            apk add --no-cache alpine-sdk sudo >/dev/null 2>&1
            chmod +x safexec/helpers/apk.sh
            bash safexec/helpers/apk.sh --arch aarch64 --version '"${{ steps.ver.outputs.apk }}"'
          '

      - name: Fix ownership of apk build outputs
        if: steps.guard.outputs.skip != 'true'
        run: |
          set -euo pipefail
          sudo chown -R "$(id -u)":"$(id -g)" .

      # collect & checksum
      - name: Collect .apks into safexec/apk/
        if: steps.guard.outputs.skip != 'true'
        run: |
          set -euo pipefail
          mkdir -p safexec/apk/x86_64 safexec/apk/aarch64

          find pkg-safexec-x86_64-apk/repo/x86_64 -maxdepth 1 -type f \
               -name 'safexec-*.apk' ! -name '*-doc-*' ! -name '*-dev-*' \
               -exec cp -v {} safexec/apk/x86_64/ \; 2>/dev/null || true

          find pkg-safexec-aarch64-apk/repo/aarch64 -maxdepth 1 -type f \
               -name 'safexec-*.apk' ! -name '*-doc-*' ! -name '*-dev-*' \
               -exec cp -v {} safexec/apk/aarch64/ \; 2>/dev/null || true

          # Verify both arches were collected
          ls -1 safexec/apk/x86_64/*.apk  || { echo "No x86_64 .apk collected!";  exit 1; }
          ls -1 safexec/apk/aarch64/*.apk || { echo "No aarch64 .apk collected!"; exit 1; }

          # One SHA256SUMS at the top of safexec/apk/ covering both arches.
          # Paths are relative so bare filenames are prefixed with arch/ dir.
          cd safexec/apk
          sha256sum x86_64/*.apk aarch64/*.apk | sort > SHA256SUMS
          cat SHA256SUMS

      - name: Clean packaging worktrees
        if: steps.guard.outputs.skip != 'true'
        run: |
          sudo chown -R "$(id -u)":"$(id -g)" pkg-safexec-*-apk 2>/dev/null || true
          sudo rm -rf pkg-safexec-*-apk || true

      - name: Generate SLSA provenance (APK packages)
        if: steps.guard.outputs.skip != 'true'
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: |
            safexec/apk/x86_64/*.apk
            safexec/apk/aarch64/*.apk
            safexec/apk/SHA256SUMS

      - name: Upload APKs as artifacts
        if: steps.guard.outputs.skip != 'true'
        uses: actions/upload-artifact@v6
        with:
          name: safexec-apks-${{ steps.ver.outputs.apk }}
          path: |
            safexec/apk/x86_64/*.apk
            safexec/apk/aarch64/*.apk
            safexec/apk/SHA256SUMS
          if-no-files-found: error

      - name: Fix workspace perms & exclude build dirs
        if: steps.guard.outputs.skip != 'true'
        run: |
          set -euo pipefail
          sudo chown -R "$(id -u)":"$(id -g)" .
          sudo rm -rf pkg-safexec-*-apk || true
          mkdir -p .git/info
          for p in safexec/bin/ pkg-safexec-*/; do
            grep -qxF "$p" .git/info/exclude 2>/dev/null || echo "$p" >> .git/info/exclude
          done

      - name: Final clean of packaging worktrees
        if: steps.guard.outputs.skip != 'true'
        run: |
          sudo chown -R "$(id -u)":"$(id -g)" pkg-safexec-*-apk 2>/dev/null || true
          sudo rm -rf pkg-safexec-*-apk || true

      - name: Commit .apk packages back to repo
        if: github.ref_type == 'branch' && steps.guard.outputs.skip != 'true'
        env:
          GITHUB_REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          BRANCH="${GITHUB_REF#refs/heads/}"

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          mkdir -p .git/info
          printf 'safexec/bin/\n' >> .git/info/exclude

          git fetch --prune origin
          git stash push -u -m "ci-artifacts" || true
          git checkout -B "${BRANCH}" "origin/${BRANCH}"
          git stash pop || true

          # Force-add .apk files (in case .gitignore or local exclude blocks them)
          sed -i -E '/^safexec\/apk\/[[:space:]]*$/d' .git/info/exclude 2>/dev/null || true
          git add -f safexec/apk/x86_64/*.apk safexec/apk/aarch64/*.apk safexec/apk/SHA256SUMS || true

          if git diff --cached --quiet; then
            echo "No .apk changes to commit."
            exit 0
          fi

          git commit -m "ci: add Alpine APK packages for ${{ steps.ver.outputs.apk }}"

          # Retry once to beat push races
          for attempt in 1 2; do
            git pull --rebase --autostash origin "${BRANCH}" && \
            git push origin "HEAD:${BRANCH}" && exit 0
            echo "Push attempt ${attempt} failed; refetching and retrying..."
            sleep 2
            git fetch --prune origin
          done

          echo "Giving up after 2 attempts."
          exit 1
